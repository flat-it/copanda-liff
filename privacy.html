      border-top: 1px solid #dcd7ca;
      padding: 24px;
      text-align: center;
    }

    .footer-copyright {
      font-size: 13px;
      color: #6d6d6d;
    }

      text-decoration: none;
    }

    .to-the-top {

<body>
