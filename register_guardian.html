<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保護者 初回登録</title>
  <link rel="stylesheet" href="./css/base.css" />
  <!-- LIFF SDK（直アクセス対策済み構成） -->
  <script src="js/env.js"></script>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.21.2/sdk.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <span class="app-title">幼稚園連絡システム copanda</span>
    <a href="index.html" class="home-link" aria-label="ホームへ戻る">🏠</a>
  </div>
</header>
<main class="page-container">
  <h2 class="page-title">保護者 初回登録</h2>
  <p>
    初めてアクセスする方は、以下のフォームから利用開始手続きを行ってください。<br>
    園から配布された <strong>認証コード</strong> と <strong>メールアドレス</strong> を入力します。
  </p>
  <section class="form-section">
    <div class="row">
      <label for="authCode">認証コード（園から配布）</label>
      <input
        type="text"
        id="authCode"
        placeholder="例：ABC123"
        autocomplete="one-time-code"
      />
    </div>
    <div class="row">
      <label for="email">メールアドレス</label>
      <input
        type="email"
        id="email"
        placeholder="例：sample@example.com"
        autocomplete="email"
      />
    </div>
    <div class="row">
      <div class="checkbox-row">
        <input type="checkbox" id="agreeTerms" />
        <label for="agreeTerms">
          *<a href="./terms.html" target="_blank">利用規約</a>をご確認のうえ、チェックしてください。
        </label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="agreePrivacy" />
        <label for="agreePrivacy">
          *<a href="./privacy.html" target="_blank">個人情報の利用目的</a>をご確認のうえ、チェックしてください。
        </label>
      </div>
    </div>
    <div class="btn-row">
      <button id="btnRegister" class="menu-btn">
        登録する
      </button>
    </div>
    <p id="msg" aria-live="polite"></p>
  </section>
</main>
<script>
  // チェックボックス未チェック時に登録ボタンを無効化
  const agreeTerms = document.getElementById("agreeTerms");
  const agreePrivacy = document.getElementById("agreePrivacy");
  const btnRegister = document.getElementById("btnRegister");

  function updateButtonState() {
    btnRegister.disabled = !(agreeTerms.checked && agreePrivacy.checked);
  }

  agreeTerms.addEventListener("change", updateButtonState);
  agreePrivacy.addEventListener("change", updateButtonState);

  // 初期状態はボタン無効
  updateButtonState();
</script>
</body>
</html>
